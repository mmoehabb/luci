title = "Hello World!"
description = "Luci config hello world example."

[bash.run]
example = "echo Hello World!"

[bash.group]
title = "Group 1"

[bash.group.value]
action1 = "echo action1"

[bash.group.value.action2]
title = "SubGroup action2 Title"
description = "SubGroup action2 Desc"
value = ["echo action2"]

[bash.group.value.action3]
title = "SubGroup action3 Title"
description = "SubGroup action3 Desc"

[bash.group.value.action3.value]
act1 = "echo action3 act1"
act2 = "echo action3 act2"

[zshell.run]
example = "echo Hello World!"

[bat.run]
example = "echo Hello World!"
